# @package _global_

defaults:
  - override /callbacks: finetuning.yaml
  - override /datamodule/dataset_description: 20220630_ponts_bdtopo

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
task:
  task_name: finetune

logger:
  comet:
    experiment_name: "RandLaNet - Bridge specialization"

# Unfreeze tghe encoder when new layer has started plateauing.
callbacks:
  finetune:
    unfreeze_encoder_epoch: 200
  log_iou_by_class: null

# Uncomment to give more weight to bridge class.
model:
  _target_: myria3d.models.model.Model
  criterion:
    _target_: torch.nn.L1Loss
    reduction: none
  lr: 0.01

trainer:
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  min_epochs: 400
  max_epochs: 600
  # gpus: [1]

datamodule:
  batch_size: 25
  transforms:
    augmentations:
      x_flip:
        p: 0.0
      y_flip:
        p: 0.0