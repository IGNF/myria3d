# @package _global_

defaults:
  - override /callbacks: finetuning.yaml
  - override /datamodule/dataset_description: 20220630_ponts_bdtopo

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
task:
  task_name: finetune

logger:
  comet:
    experiment_name: "V0.0-20220630_ponts_bdtopo-finetuning-bbox-regularization"

callbacks:
  finetune:
    unfreeze_fc_end_epoch: 10
    unfreeze_decoder_train_epoch: 50
    unfreeze_encoder_epoch: 100
  log_iou_by_class: null
  early_stopping: null

# Uncomment to give more weight to bridge class.
model:
  lr: 0.1
  criterion:
    weight:
      _target_: torch.FloatTensor
      _args_:
        - [1.0, 10.0]
  lr_scheduler:
    patience: 1000000
    cooldown: 1000000

trainer:
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  min_epochs: 300
  max_epochs: 350
  # gpus: [1]

